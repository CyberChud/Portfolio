<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Cyber Security Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@^2.0/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-blue-900 text-white">
    <header class="text-center p-8">
        <h1 class="text-4xl font-bold">Contact Me</h1>
    </header>
    <nav class="flex justify-center space-x-4">
        <a href="index.html" class="text-blue-300 hover:text-blue-500">Home</a>
        <a href="skills.html" class="text-blue-300 hover:text-blue-500">Skills</a>
        <a href="projects.html" class="text-blue-300 hover:text-blue-500">Projects</a>
        <a href="certifications.html" class="text-blue-300 hover:text-blue-500">Certifications</a>
        <a href="contact.html" class="text-blue-300 hover:text-blue-500">Contact</a>
    </nav>
    <main class="mt-8 p-8">
        <form action="#" method="POST" class="space-y-4">
            <input type="text" name="name" placeholder="Your Name" required class="w-full p-2 bg-gray-700">
            <input type="email" name="email" placeholder="Your Email" required class="w-full p-2 bg-gray-700">
            <textarea name="message" placeholder="Your Message" required class="w-full p-2 bg-gray-700"></textarea>
            <button type="submit" class="px-4 py-2 bg-blue-500 hover:bg-blue-700 rounded">Send Message</button>
        </form>
    </main>
    <footer class="text-center p-4">
        <p>Copyright © 2024 by Zach Mariskanish. All rights reserved.</p>
    </footer>
</body>
</html>
