<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Cyber Security Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@^2.0/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> <!-- Link to the external CSS for animations and styles -->
</head>
<body>
    <div class="video-background">
        <!-- Background video or gradient here, depending on your choice -->
    </div>
    <div class="content">
        <header class="text-center p-8">
            <div class="typewriter">
                <h1>Contact Me</h1>
            </div>
        </header>
        <nav class="flex justify-center space-x-4">
            <a href="index.html" class="text-blue-300 hover:text-blue-500">Home</a>
            <a href="skills.html" class="text-blue-300 hover:text-blue-500">Skills</a>
            <a href="projects.html" class="text-blue-300 hover:text-blue-500">Projects</a>
            <a href="certifications.html" class="text-blue-300 hover:text-blue-500">Certifications</a>
            <a href="contact.html" class="text-blue-300 hover:text-blue-500">Contact</a>
        </nav>
        <main class="mt-8">
            <section class="text-center p-8" data-aos="fade-up">
                <h2 class="text-3xl">Get in Touch</h2>
                <form action="#" method="POST" class="p-8">
                    <input type="text" name="name" placeholder="Your Name" required class="bg-gray-700 p-2 text-white w-full mb-4">
                    <input type="email" name="email" placeholder="Your Email" required class="bg-gray-700 p-2 text-white w-full mb-4">
                    <textarea name="message" placeholder="Your Message" required class="bg-gray-700 p-2 text-white w-full mb-4"></textarea>
                    <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Send Message</button>
                </form>
            </section>
        </main>
        <footer class="text-center p-4">
            <p>Copyright © 2024 by [Your Name]. All rights reserved.</p>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/aos@next/dist/aos.js"></script>
    <script src="scripts.js"></script> <!-- Link to the external JS for common scripts -->
</body>
</html>
